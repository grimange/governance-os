name: Release

# Triggered when a version tag is pushed (e.g. v0.9.0, v1.0.0).
# The tag must match the version in src/governance_os/version.py exactly.
#
# Jobs run in sequence:
#   validate → build → smoke → github-release → publish
#
# "publish" is gated by the "pypi" GitHub environment and uses
# PyPI trusted publishing (OIDC — no API key required).
# See docs/release-operations.md for external setup requirements.

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write  # needed to create GitHub releases and upload assets

jobs:
  # ---------------------------------------------------------------------------
  # validate: full test suite + version/tag/changelog consistency check
  # ---------------------------------------------------------------------------
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run full test suite
        run: pytest

      - name: Check version/tag/changelog consistency
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'EOF'
          import re, sys
          from pathlib import Path
          import os

          tag = os.environ["GITHUB_REF_NAME"]  # e.g. "v0.9.0"
          if not tag.startswith("v"):
              print(f"ERROR: tag {tag!r} does not start with 'v'")
              sys.exit(1)
          expected = tag[1:]  # "0.9.0"

          # Check version.py
          version_py = Path("src/governance_os/version.py").read_text()
          m = re.search(r'__version__\s*=\s*"([^"]+)"', version_py)
          if not m:
              print("ERROR: could not parse __version__ from version.py")
              sys.exit(1)
          actual = m.group(1)
          if actual != expected:
              print(f"ERROR: tag {tag!r} implies version {expected!r} but version.py has {actual!r}")
              sys.exit(1)

          # Check CHANGELOG.md
          changelog = Path("CHANGELOG.md").read_text()
          if f"## [{expected}]" not in changelog:
              print(f"ERROR: CHANGELOG.md has no entry for [{expected}]")
              sys.exit(1)

          print(f"OK: tag={tag!r}  version.py={actual!r}  CHANGELOG entry present")
          EOF

  # ---------------------------------------------------------------------------
  # build: produce sdist + wheel; upload as pipeline artifacts
  # ---------------------------------------------------------------------------
  build:
    name: Build artifacts
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify artifacts
        run: |
          ls -lh dist/
          test -n "$(ls dist/*.whl 2>/dev/null)" || (echo "ERROR: no wheel" && exit 1)
          test -n "$(ls dist/*.tar.gz 2>/dev/null)" || (echo "ERROR: no sdist" && exit 1)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # smoke: install built wheel in a clean env; verify CLI + import
  # ---------------------------------------------------------------------------
  smoke:
    name: Smoke test built wheel
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install wheel in clean environment
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --quiet dist/*.whl

      - name: Smoke — CLI entrypoint
        run: /tmp/smoke-venv/bin/govos --help

      - name: Smoke — version metadata
        run: |
          /tmp/smoke-venv/bin/python - <<'EOF'
          import governance_os
          from importlib.metadata import version
          pkg_ver = version("governance-os")
          assert pkg_ver == governance_os.__version__, (
              f"version mismatch: metadata={pkg_ver!r} module={governance_os.__version__!r}"
          )
          print(f"OK: governance_os=={pkg_ver}")
          EOF

      - name: Smoke — govos scan help
        run: /tmp/smoke-venv/bin/govos scan --help

  # ---------------------------------------------------------------------------
  # github-release: create GitHub Release, attach sdist + wheel
  # ---------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract changelog section for this version
        id: changelog
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'EOF'
          import os, re, sys
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          ver = tag.lstrip("v")
          text = Path("CHANGELOG.md").read_text()

          # Find the section for this version
          pattern = rf"(?s)(## \[{re.escape(ver)}\][^\n]*\n)(.*?)(?=\n## \[|\Z)"
          m = re.search(pattern, text)
          if not m:
              print(f"WARNING: no CHANGELOG section found for {ver!r}", file=sys.stderr)
              body = f"Release {tag}"
          else:
              body = m.group(1) + m.group(2).strip()

          Path("release-notes.md").write_text(body)
          print("Wrote release-notes.md")
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*

  # ---------------------------------------------------------------------------
  # publish: upload to PyPI via OIDC trusted publishing
  #
  # REQUIRES external setup (see docs/release-operations.md):
  #   1. Create a GitHub environment named "pypi" in repo settings.
  #   2. Configure a PyPI trusted publisher for this repo/workflow.
  #   3. Enable required reviewers on the "pypi" environment (recommended).
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
